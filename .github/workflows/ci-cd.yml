name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab1-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lab1-app:${{ github.sha }}

  # Деплой на машине, где запущен self-hosted runner (без SSH на другой сервер)
  deploy:
    needs: build-push
    runs-on: self-hosted
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and run container on runner
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lab1-app:latest
          docker stop lab1-app 2>/dev/null || true
          docker rm lab1-app 2>/dev/null || true
          docker run -d --name lab1-app -p 80:5000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/lab1-app:latest
          docker ps
